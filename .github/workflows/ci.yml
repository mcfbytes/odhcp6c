name: odhcp6c

on:
  pull_request:
  push:

env:
  archs: "aarch64 arm mips mips64 powerpc powerpc64 riscv64 x86_64"

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            gcc: /usr/bin/aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
          - arch: arm
            gcc: /usr/bin/arm-linux-gnueabi-gcc
            packages: gcc-arm-linux-gnueabi
          - arch: mips
            gcc: /usr/bin/mips-linux-gnu-gcc
            packages: gcc-mips-linux-gnu
          - arch: mips64
            gcc: /usr/bin/mips64-linux-gnuabi64-gcc
            packages: gcc-mips64-linux-gnuabi64
          - arch: powerpc
            gcc: /usr/bin/powerpc-linux-gnu-gcc
            packages: gcc-powerpc-linux-gnu
          - arch: powerpc64
            gcc: /usr/bin/powerpc64-linux-gnu-gcc
            packages: gcc-powerpc64-linux-gnu
          - arch: riscv64
            gcc: /usr/bin/riscv64-linux-gnu-gcc
            packages: gcc-riscv64-linux-gnu
          - arch: x86_64
            gcc: /usr/bin/x86_64-linux-gnu-gcc
            packages: gcc-x86-64-linux-gnu
    outputs:
      size-aarch64: ${{ steps.with_ubus.outputs.size_aarch64 }}
      size-arm: ${{ steps.with_ubus.outputs.size_arm }}
      size-mips: ${{ steps.with_ubus.outputs.size_mips }}
      size-mips64: ${{ steps.with_ubus.outputs.size_mips64 }}
      size-powerpc: ${{ steps.with_ubus.outputs.size_powerpc }}
      size-powerpc64: ${{ steps.with_ubus.outputs.size_powerpc64 }}
      size-riscv64: ${{ steps.with_ubus.outputs.size_riscv64 }}
      size-x86_64: ${{ steps.with_ubus.outputs.size_x86_64 }}
    steps:
      - name: Checkout odhcp6c
        uses: actions/checkout@v5

      - name: Checkout json-c
        uses: actions/checkout@v5
        with:
          repository: json-c/json-c
          path: depends/json-c

      - name: Checkout libubox
        uses: actions/checkout@v5
        with:
          repository: openwrt/libubox
          path: depends/libubox

      - name: Checkout ubus
        uses: actions/checkout@v5
        with:
          repository: openwrt/ubus
          path: depends/ubus

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install ${{ matrix.packages }}

      - name: Prepare build
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/build

      - name: Build json-c
        working-directory: depends/json-c
        run: |
          cmake \
            -DCMAKE_C_COMPILER=${{ matrix.gcc }} \
            -DCMAKE_PREFIX_PATH=${GITHUB_WORKSPACE}/build \
            -DBUILD_SHARED_LIBS=OFF \
            -DDISABLE_EXTRA_LIBS=ON \
            -DBUILD_TESTING=OFF \
            --install-prefix ${GITHUB_WORKSPACE}/build \
            -B . -S .
          make
          make install

      - name: Build libubox
        working-directory: depends/libubox
        run: |
          cmake \
            -DCMAKE_C_COMPILER=${{ matrix.gcc }} \
            -DCMAKE_PREFIX_PATH=${GITHUB_WORKSPACE}/build \
            -DBUILD_LUA=OFF \
            -DBUILD_EXAMPLES=OFF \
            --install-prefix ${GITHUB_WORKSPACE}/build \
            -B . -S .
          make
          make install

      - name: Build ubus
        working-directory: depends/ubus
        run: |
          cmake \
            -DCMAKE_C_COMPILER=${{ matrix.gcc }} \
            -DCMAKE_PREFIX_PATH=${GITHUB_WORKSPACE}/build \
            -DBUILD_LUA=OFF \
            -DBUILD_EXAMPLES=OFF \
            --install-prefix ${GITHUB_WORKSPACE}/build \
            -B . -S .
          make
          make install

      - id: with_ubus
        name: Build odhcp6c (with ubus)
        env:
          BUILD_DIR: build/odhcp6c-with-ubus
        run: |
          cmake \
            -DCMAKE_C_COMPILER=${{ matrix.gcc }} \
            -DCMAKE_PREFIX_PATH=${GITHUB_WORKSPACE}/build \
            -DUBUS=ON \
            -B $BUILD_DIR -S .
          make -C $BUILD_DIR
          echo "size_${{ matrix.arch }}=$( find $BUILD_DIR -type f -name odhcp6c -printf '%s' )" >> $GITHUB_OUTPUT

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: odhcp6c-${{ matrix.arch }}-binaries
          path: |
            build/odhcp6c-*/odhcp6c
          if-no-files-found: error

  summary:
    name: Sizes
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Sizes summary
        env:
          size_aarch64: ${{needs.build.outputs.size-aarch64}}
          size_arm: ${{needs.build.outputs.size-arm}}
          size_mips: ${{needs.build.outputs.size-mips}}
          size_mips64: ${{needs.build.outputs.size-mips64}}
          size_powerpc: ${{needs.build.outputs.size-powerpc}}
          size_powerpc64: ${{needs.build.outputs.size-powerpc64}}
          size_riscv64: ${{needs.build.outputs.size-riscv64}}
          size_x86_64: ${{needs.build.outputs.size-x86_64}}
        run: |
          echo "### ${GITHUB_WORKFLOW} sizes :floppy_disk:" >> $GITHUB_STEP_SUMMARY

          echo "| arch | with_ubus |" >> $GITHUB_STEP_SUMMARY
          echo "| :---: | :---: |" >> $GITHUB_STEP_SUMMARY

          for arch in ${{ env.archs }}; do
            value=size_${arch}
            echo "| $arch | ${!value} |" >> $GITHUB_STEP_SUMMARY
          done
